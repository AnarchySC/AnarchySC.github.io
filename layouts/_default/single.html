{{ define "main" }}
<div class="container">
  <article class="post-content">
    <h1>{{ .Title }}</h1>
    {{- with .Date }}
    <div class="post-meta">
      <time datetime="{{ .Format "2006-01-02" }}">{{ .Format "2006.01.02" }}</time>
    </div>
    {{- end }}
    <div class="post-body">
      {{ .Content }}
    </div>
  </article>
</div>
{{ end }}
